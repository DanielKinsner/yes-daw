name: ci

# The mechanical gate. Every push to main and every PR builds the app and runs the headless,
# self-asserting DSP check on Windows + Linux + macOS (H0's exit names Win+mac; Linux is the
# cheapest portability signal and where the RTSan leg will live). A green check here IS the
# verification — no human reads a diff or listens to the tone.
#
# CI builds the GUI app (proves it compiles + links) but never RUNS it (runners have no display
# or audio device). Only the pure, headless YesDawCheck is executed, via ctest.
#
# Everything runs through the `ci` CMake preset (Ninja/Release) so the cloud and all three of
# Dan's machines invoke it byte-identically and path-free.

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false          # one OS failing must not hide the others (the agent triages, not Dan)
      matrix:
        include:
          - { name: Windows, os: windows-latest }
          - { name: Linux,   os: ubuntu-22.04 }
          - { name: macOS,   os: macos-14 }
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # JUCE's GUI modules need X11/ALSA/etc to link on Linux (web browser + curl are compiled
      # out via JUCE_WEB_BROWSER=0 / JUCE_USE_CURL=0, but the rest are required).
      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev ladspa-sdk libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev ninja-build

      # Ninja (from the preset) needs cl.exe on PATH; this loads the MSVC environment.
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Get CMake + Ninja (consistent across all runners)
        uses: lukka/get-cmake@latest

      # Cache the fetched JUCE + Catch2 sources so we don't re-clone them every run.
      # Keyed to the pinned tags + CMakeLists so bumping a dependency busts the cache.
      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-juce8.0.4-catch3.7.1-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-juce8.0.4-catch3.7.1-

      - name: Configure (Release — Debug hangs on JUCE asserts in CI)
        run: cmake --preset ci

      - name: Build (GUI app + headless test)
        run: cmake --build --preset ci

      - name: Test (headless DSP self-check)
        run: ctest --preset ci
