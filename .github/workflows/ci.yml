name: ci

# The mechanical gate. Every push to main and every PR builds the app and runs the headless,
# self-asserting DSP check on Windows + Linux + macOS (H0's exit names Win+mac; Linux is the
# cheapest portability signal and where the RTSan leg will live). A green check here IS the
# verification — no human reads a diff or listens to the tone.
#
# CI builds the GUI app (proves it compiles + links) but never RUNS it (runners have no display
# or audio device). Only the pure, headless YesDawCheck is executed, via ctest.
#
# Everything runs through the `ci` CMake preset (Ninja/Release) so the cloud and all three of
# Dan's machines invoke it byte-identically and path-free.

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never a main-push run — every commit on main must keep its own
  # green/red verdict so `git bisect run ctest --preset ci` stays mechanical.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false          # one OS failing must not hide the others (the agent triages, not Dan)
      matrix:
        include:
          - { name: Windows, os: windows-latest }
          - { name: Linux,   os: ubuntu-22.04 }
          - { name: macOS,   os: macos-14 }
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # JUCE's GUI modules need X11/ALSA/etc to link on Linux. webkit + curl are deliberately
      # OMITTED: JUCE_WEB_BROWSER=0 / JUCE_USE_CURL=0 compile out their only consumers, and
      # libwebkit2gtk-4.1-dev isn't reliably present on the ubuntu-22.04 image (the 4.0/4.1 trap).
      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev ninja-build

      # Ninja (from the preset) needs cl.exe on PATH; this loads the MSVC environment.
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Get CMake + Ninja (consistent across all runners)
        uses: lukka/get-cmake@latest

      # Cache the fetched JUCE + Catch2 sources so we don't re-clone them every run.
      # Keyed to the pinned tags + CMakeLists so bumping a dependency busts the cache.
      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: build-ci/_deps
          key: deps-${{ runner.os }}-juce8.0.4-catch3.7.1-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-juce8.0.4-catch3.7.1-

      - name: Configure (Release — Debug hangs on JUCE asserts in CI)
        run: cmake --preset ci

      - name: Build (GUI app + headless test)
        run: cmake --build --preset ci

      - name: Test (headless DSP self-check)
        run: ctest --preset ci

  # Real-time safety: compile the pure DSP test with -fsanitize=realtime and run it. RTSan ABORTS if
  # the [[clang::nonblocking]] hot path (SineSource::processMono/nextSample) ever allocates, locks, or
  # does I/O — CLAUDE.md's "audio thread never allocates" rule, enforced mechanically. Needs Clang 20+
  # (where RTSan landed). YesDawCheck is pure (no JUCE), so no X11/audio deps are required here.
  rtsan:
    name: RTSan (audio thread no-alloc)
    runs-on: ubuntu-24.04
    env:
      RTSAN_OPTIONS: "halt_on_error=1:suppressions=${{ github.workspace }}/rtsan_suppressions.txt"
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 20 + Ninja
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y ninja-build

      # YESDAW_BUILD_APPS=OFF -> only the pure Catch2 test is configured, so this leg needs neither
      # the JUCE clone nor the X11/ALSA dev libs JUCE's modules require at configure time.
      - name: Configure (RTSan, Clang 20, test-only)
        run: >
          cmake -B build-rt -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_C_COMPILER=clang-20 -DCMAKE_CXX_COMPILER=clang++-20
          -DYESDAW_BUILD_APPS=OFF -DYESDAW_SANITIZER=realtime

      # Build ALL configured targets: with YESDAW_BUILD_APPS=OFF that's exactly the pure test exes
      # (no JUCE), so every test target exists and ctest finds no unbuilt sentinels.
      - name: Build the headless tests
        run: cmake --build build-rt

      - name: Run under RTSan (aborts on a real-time violation)
        run: ctest --test-dir build-rt --output-on-failure --no-tests=error

  # Data-race safety: compile the pure tests with -fsanitize=thread and run them. RTSan proves the audio
  # thread never allocates/locks; only TSan proves the release/acquire contract the Runtime's
  # publish/process/reclaim path relies on (ADR-0006) actually has no data race. The 2-thread Runtime
  # stress test is the target. Mirrors the rtsan leg (Clang 20, pure tests, no JUCE) — but with NO
  # -Wl,-z,now (that is RTSan-specific) and YESDAW_SANITIZER=thread.
  tsan:
    name: TSan (audio<->control data races)
    runs-on: ubuntu-24.04
    env:
      TSAN_OPTIONS: "halt_on_error=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 20 + Ninja
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y ninja-build

      - name: Configure (TSan, Clang 20, test-only)
        run: >
          cmake -B build-tsan -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_C_COMPILER=clang-20 -DCMAKE_CXX_COMPILER=clang++-20
          -DYESDAW_BUILD_APPS=OFF -DYESDAW_SANITIZER=thread

      - name: Build the headless tests
        run: cmake --build build-tsan

      - name: Run under TSan (aborts on a data race)
        run: ctest --test-dir build-tsan --output-on-failure --no-tests=error
